<!doctype html>
<html lang="it">
  <head>
    <title>yt-dockerWloader</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <h1>yt-dockerWloader</h1>
    <form id="downloadForm">
      <input
        type="text"
        name="url"
        placeholder="Incolla URL YouTube (video o playlist)"
        required
      />
      <select name="preset">
        <option value="best">Qualità Massima</option>
        <option value="mp4_720">MP4 720p</option>
        <option value="mp3">Solo Audio (MP3)</option>
      </select>
      <input
        type="text"
        name="path"
        value="/downloads"
        placeholder="Cartella di destinazione"
      />
      <button type="submit">Scarica</button>
    </form>
    <div id="status"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
